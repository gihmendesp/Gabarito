<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito da Gi v2.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="topo">

        <h1>📘 Gabarito da Gi v2.0</h1>

        <button id="toggleTema">🌙</button>

    </div>

    <p>Seu sistema de estudos para concursos</p>

</header>

<main>

<!-- CADASTRO -->
<section class="card">

<h2>➕ Nova Questão</h2>

<input id="disciplina" placeholder="Disciplina">

<input id="banca" placeholder="Banca">

<input id="assunto" placeholder="Assunto">

<input id="concurso" placeholder="Concurso">

<input id="ano" placeholder="Ano">

<textarea id="enunciado" placeholder="Enunciado da questão"></textarea>

<textarea id="resposta" placeholder="Resposta / Comentário"></textarea>

<button id="btnAdicionar">Adicionar Questão</button>

</section>

<!-- DASHBOARD -->
<section class="card">

<h2>📊 Desempenho</h2>

<div class="stats">

<div><h3>Total</h3><p id="total">0</p></div>

<div><h3>Respondidas</h3><p id="respondidas">0</p></div>

<div><h3>Acertos</h3><p id="acertos">0</p></div>

<div><h3>Erros</h3><p id="erros">0</p></div>

</div>

<div class="barra">
<div id="progresso"></div>
</div>

<p id="mensagem"></p>

</section>

<!-- FILTROS -->
<section class="card">

<h2>🔍 Filtros</h2>

<input id="filtroTexto" placeholder="Pesquisar...">

<select id="filtroStatus">
<option value="todos">Todos</option>
<option value="acertou">Acertadas</option>
<option value="errou">Erradas</option>
<option value="nao">Não respondidas</option>
</select>

</section>

<!-- LISTA -->
<section class="card">

<h2>📚 Questões</h2>

<div id="lista"></div>

</section>

</main>

<footer>

<p>Gabarito da Gi v2.0 © 2026</p>

</footer>

<script src="script.js"></script>

</body>
</html>
